<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <!-- Icon background -->
  <rect x="0" y="0" width="160" height="160" rx="36" ry="36" fill="#0D0D0D"/>

  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00FF87" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#00FF87" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="160" height="160" rx="36" ry="36" fill="url(#glow)"/>

  <!-- Lightning bolt (scaled to 160x160 box) -->
  <polygon
    points="90,18 50,86 76,86 68,140 112,68 85,68"
    fill="#00FF87"
  />
  <polygon
    points="90,18 50,86 76,86 68,140 112,68 85,68"
    fill="none"
    stroke="#00CC6A"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Text: shred -->
  <text
    x="186"
    y="96"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="62"
    fill="#FFFFFF"
    letter-spacing="-1"
  >shred</text>

  <!-- Text: Members (green) -->
  <text
    x="186"
    y="148"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="42"
    fill="#00FF87"
    letter-spacing="1"
  >Members</text>
</svg>
